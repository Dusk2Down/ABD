services:
  postgres:
    image: postgres:15
    container_name: postgres_lab1
    environment:
      POSTGRES_DB: bigdata_lab1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./scripts/dml.sql:/docker-entrypoint-initdb.d/02_dml.sql
      - ./data:/data
